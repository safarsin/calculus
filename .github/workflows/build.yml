name: Build Mac and Linux

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      # ВНИМАНИЕ СЮДА: заменили libgirepository1.0-dev на libgirepository-2.0-dev
      run: |
        sudo apt-get update
        sudo apt-get install -y libgirepository-2.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1

    - name: Install Python packages (Linux)
      if: runner.os == 'Linux'
      run: |
        python -m pip install --upgrade pip
        pip install pywebview[gtk] PyGObject sympy pyinstaller

    - name: Install Python packages (Mac)
      if: runner.os == 'macOS'
      run: |
        python -m pip install --upgrade pip
        pip install pywebview sympy pyinstaller

    - name: Build application with PyInstaller
      run: |
        pyinstaller --noconsole --onefile standalone_calc.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Calculus-${{ matrix.os }}
        path: dist/*